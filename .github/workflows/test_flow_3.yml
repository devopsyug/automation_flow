name: test_flow_3
on: push
jobs:
  build_npm:
    runs-on: ubuntu-latest
    steps:
      - name: get code
        uses: actions/checkout@v3
      - name: npm ci
        run: npm ci
      - name: npm build
        run: npm run build
      - name: upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: package
          path: src/dist
  deploy_app:
    needs: build_npm
    runs-on: ubuntu-latest
    steps:
      - name: deploy app
        run: echo "deploy application"